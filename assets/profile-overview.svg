<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="286" viewBox="0 0 1024 286" role="img" aria-labelledby="title desc">
  <title id="title">Profile overview</title>
  <desc id="desc">Profile statistics, current tools, and recent work heading.</desc>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .heading { fill: #f3f3f3; font-size: 28px; font-weight: 700; }
    .muted { fill: #949494; }
    .pill { fill: #0b3656; }
    .pillText { fill: #77bcf5; font-size: 16px; font-weight: 600; }
  </style>

  <rect width="1024" height="286" fill="#222222"/>

  <text class="sans" x="48" y="51" fill="#f2f2f2" font-size="18">
    <tspan font-weight="700">1,135</tspan><tspan dx="6">contributions</tspan>
  </text>
  <text class="sans" x="247" y="51" fill="#f2f2f2" font-size="18">
    <tspan font-weight="700">5</tspan><tspan dx="6">public repositories</tspan>
  </text>
  <text class="sans" x="462" y="51" fill="#f2f2f2" font-size="18">
    <tspan font-weight="700">1</tspan><tspan dx="6">follower</tspan>
  </text>
  <text class="sans muted" x="586" y="51" font-size="18">joined July 2025</text>

  <line x1="48" y1="87" x2="976" y2="87" stroke="#393939"/>

  <text class="sans heading" x="48" y="151">Current orbit</text>
  <text class="sans muted" x="976" y="151" font-size="16" text-anchor="end">small, honest, useful</text>

  <g class="sans">
    <rect class="pill" x="48" y="174" width="55" height="31" rx="16"/>
    <text class="pillText" x="75.5" y="195" text-anchor="middle">Java</text>

    <rect class="pill" x="115" y="174" width="74" height="31" rx="16"/>
    <text class="pillText" x="152" y="195" text-anchor="middle">Gradle</text>

    <rect class="pill" x="201" y="174" width="48" height="31" rx="16"/>
    <text class="pillText" x="225" y="195" text-anchor="middle">Git</text>

    <rect class="pill" x="261" y="174" width="160" height="31" rx="16"/>
    <text class="pillText" x="341" y="195" text-anchor="middle">Minecraft protocol</text>

    <rect class="pill" x="433" y="174" width="100" height="31" rx="16"/>
    <text class="pillText" x="483" y="195" text-anchor="middle">Cross-play</text>
  </g>

  <text class="sans heading" x="48" y="268">Recent work</text>
  <text class="sans muted" x="976" y="268" font-size="16" text-anchor="end">real repositories</text>
</svg>
